<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ElasticSearch 复习助手</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <div>
          <p class="app-label">ElasticSearch 复习助手</p>
          <h1>刷题、错题、模拟考试</h1>
        </div>
        <button class="primary-action" data-action="start-exam">模拟考试</button>
      </header>

      <nav class="nav-tabs" aria-label="主导航">
        <button class="nav-tab is-active" data-view="dashboard">总览</button>
        <button class="nav-tab" data-view="practice">专项练习</button>
        <button class="nav-tab" data-view="wrong">错题本</button>
        <button class="nav-tab" data-view="exam">模拟考试</button>
        <button class="nav-tab" data-view="stats">学习统计</button>
        <button class="nav-tab" data-view="data">数据</button>
      </nav>

      <main id="main" class="main-grid" aria-live="polite"></main>
    </div>

    <script src="questions-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
